name: Weekly Download Stats

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      # Helper: each step tolerates upstream failures (rate limits, 5xx, malformed JSON)
      # and emits an empty value so the CSV row keeps its column alignment.
      - name: Fetch npm downloads
        id: npm
        run: |
          set +e
          WEEKLY_RAW=$(curl -fsSL --retry 5 --retry-delay 15 --retry-all-errors "https://api.npmjs.org/downloads/point/last-week/eu-vat-rates-data")
          TOTAL_RAW=$(curl -fsSL --retry 5 --retry-delay 15 --retry-all-errors "https://api.npmjs.org/downloads/point/2024-01-01:$(date +%Y-%m-%d)/eu-vat-rates-data")
          WEEKLY=$(echo "$WEEKLY_RAW" | python3 -c "import sys,json; print(json.load(sys.stdin)['downloads'])" 2>/dev/null || echo "")
          TOTAL=$(echo "$TOTAL_RAW" | python3 -c "import sys,json; print(json.load(sys.stdin)['downloads'])" 2>/dev/null || echo "")
          echo "weekly=$WEEKLY" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Fetch PyPI downloads
        id: pypi
        # pypistats aggressively rate-limits shared GitHub Actions IPs; tolerate failure.
        run: |
          set +e
          DATA=$(curl -fsSL --retry 5 --retry-delay 15 --retry-all-errors "https://pypistats.org/api/packages/eu-vat-rates-data/recent")
          WEEKLY=$(echo "$DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['last_week'])" 2>/dev/null || echo "")
          echo "weekly=$WEEKLY" >> "$GITHUB_OUTPUT"

      - name: Fetch Packagist downloads
        id: packagist
        # Packagist has no weekly; monthly + total
        run: |
          set +e
          DATA=$(curl -fsSL --retry 5 --retry-delay 15 --retry-all-errors "https://packagist.org/packages/vatnode/eu-vat-rates-data.json")
          TOTAL=$(echo "$DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['package']['downloads']['total'])" 2>/dev/null || echo "")
          MONTHLY=$(echo "$DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['package']['downloads']['monthly'])" 2>/dev/null || echo "")
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "monthly=$MONTHLY" >> "$GITHUB_OUTPUT"

      - name: Fetch RubyGems downloads
        id: rubygems
        # RubyGems API only exposes all-time totals (no period-based endpoint)
        run: |
          set +e
          DATA=$(curl -fsSL --retry 5 --retry-delay 15 --retry-all-errors "https://rubygems.org/api/v1/gems/eu_vat_rates_data.json")
          TOTAL=$(echo "$DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['downloads'])" 2>/dev/null || echo "")
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Fetch GitHub stars
        id: github
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          fetch_stars() {
            local repo="$1"
            local data
            data=$(curl -fsSL --retry 5 --retry-delay 15 --retry-all-errors \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/vatnode/$repo")
            echo "$data" | python3 -c "import sys,json; print(json.load(sys.stdin)['stargazers_count'])" 2>/dev/null || echo ""
          }

          STARS_JS=$(fetch_stars eu-vat-rates-data-js)
          STARS_PY=$(fetch_stars eu-vat-rates-data-python)
          STARS_PHP=$(fetch_stars eu-vat-rates-data-php)
          STARS_GO=$(fetch_stars eu-vat-rates-data-go)
          STARS_RB=$(fetch_stars eu-vat-rates-data-ruby)

          # Only compute total if every value is a number; otherwise leave it empty.
          if [[ "$STARS_JS" =~ ^[0-9]+$ && "$STARS_PY" =~ ^[0-9]+$ && "$STARS_PHP" =~ ^[0-9]+$ && "$STARS_GO" =~ ^[0-9]+$ && "$STARS_RB" =~ ^[0-9]+$ ]]; then
            STARS_TOTAL=$((STARS_JS + STARS_PY + STARS_PHP + STARS_GO + STARS_RB))
          else
            STARS_TOTAL=""
          fi

          echo "stars_js=$STARS_JS" >> "$GITHUB_OUTPUT"
          echo "stars_py=$STARS_PY" >> "$GITHUB_OUTPUT"
          echo "stars_php=$STARS_PHP" >> "$GITHUB_OUTPUT"
          echo "stars_go=$STARS_GO" >> "$GITHUB_OUTPUT"
          echo "stars_rb=$STARS_RB" >> "$GITHUB_OUTPUT"
          echo "stars_total=$STARS_TOTAL" >> "$GITHUB_OUTPUT"

      - name: Ensure CSV header is current
        run: |
          mkdir -p stats
          HEADER="date,npm_weekly,npm_total,pypi_weekly,packagist_monthly,packagist_total,rubygems_total,stars_js,stars_py,stars_php,stars_go,stars_rb,stars_total"
          if [ ! -f stats/downloads.csv ]; then
            echo "$HEADER" > stats/downloads.csv
          elif ! head -1 stats/downloads.csv | grep -q "^date,npm_weekly,npm_total,pypi_weekly"; then
            # Header is outdated — replace it, keep all data rows (trim to new column count)
            echo "$HEADER" > stats/downloads.csv.new
            tail -n +2 stats/downloads.csv | cut -d, -f1-13 >> stats/downloads.csv.new
            mv stats/downloads.csv.new stats/downloads.csv
          fi

      - name: Append to stats log
        run: |
          DATE=$(date -u +%Y-%m-%d)
          echo "$DATE,${{ steps.npm.outputs.weekly }},${{ steps.npm.outputs.total }},${{ steps.pypi.outputs.weekly }},${{ steps.packagist.outputs.monthly }},${{ steps.packagist.outputs.total }},${{ steps.rubygems.outputs.total }},${{ steps.github.outputs.stars_js }},${{ steps.github.outputs.stars_py }},${{ steps.github.outputs.stars_php }},${{ steps.github.outputs.stars_go }},${{ steps.github.outputs.stars_rb }},${{ steps.github.outputs.stars_total }}" >> stats/downloads.csv

      - name: Commit stats
        run: |
          git config user.name "vatnode-bot"
          git config user.email "bot@vatnode.dev"
          git add stats/downloads.csv
          git diff --staged --quiet || git commit -m "chore: weekly stats $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
