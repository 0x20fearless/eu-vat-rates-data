name: Weekly Download Stats

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Fetch npm downloads
        id: npm
        run: |
          WEEKLY=$(curl -s "https://api.npmjs.org/downloads/point/last-week/eu-vat-rates-data" | python3 -c "import sys,json; print(json.load(sys.stdin)['downloads'])")
          TOTAL=$(curl -s "https://api.npmjs.org/downloads/point/2024-01-01:$(date +%Y-%m-%d)/eu-vat-rates-data" | python3 -c "import sys,json; print(json.load(sys.stdin)['downloads'])")
          echo "weekly=$WEEKLY" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Fetch PyPI downloads
        id: pypi
        run: |
          DATA=$(curl -s "https://pypistats.org/api/packages/eu-vat-rates-data/recent")
          WEEKLY=$(echo "$DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['last_week'])")
          MONTHLY=$(echo "$DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['last_month'])")
          echo "weekly=$WEEKLY" >> "$GITHUB_OUTPUT"
          echo "monthly=$MONTHLY" >> "$GITHUB_OUTPUT"

      - name: Fetch Packagist downloads
        id: packagist
        run: |
          DATA=$(curl -s "https://packagist.org/packages/vatnode/eu-vat-rates-data.json")
          TOTAL=$(echo "$DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['package']['downloads']['total'])")
          MONTHLY=$(echo "$DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['package']['downloads']['monthly'])")
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "monthly=$MONTHLY" >> "$GITHUB_OUTPUT"

      - name: Fetch RubyGems downloads
        id: rubygems
        run: |
          DATA=$(curl -s "https://rubygems.org/api/v1/gems/eu_vat_rates_data.json")
          TOTAL=$(echo "$DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['downloads'])")
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Fetch GitHub stars
        id: stars
        run: |
          JS=$(curl -s "https://api.github.com/repos/vatnode/eu-vat-rates-data-js" | python3 -c "import sys,json; print(json.load(sys.stdin)['stargazers_count'])")
          PY=$(curl -s "https://api.github.com/repos/vatnode/eu-vat-rates-data-python" | python3 -c "import sys,json; print(json.load(sys.stdin)['stargazers_count'])")
          PHP=$(curl -s "https://api.github.com/repos/vatnode/eu-vat-rates-data-php" | python3 -c "import sys,json; print(json.load(sys.stdin)['stargazers_count'])")
          GO=$(curl -s "https://api.github.com/repos/vatnode/eu-vat-rates-data-go" | python3 -c "import sys,json; print(json.load(sys.stdin)['stargazers_count'])")
          RB=$(curl -s "https://api.github.com/repos/vatnode/eu-vat-rates-data-ruby" | python3 -c "import sys,json; print(json.load(sys.stdin)['stargazers_count'])")
          TOTAL=$((JS + PY + PHP + GO + RB))
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Ensure CSV header exists
        run: |
          mkdir -p stats
          if [ ! -f stats/downloads.csv ] || ! head -1 stats/downloads.csv | grep -q "^date,"; then
            echo "date,npm_weekly,npm_total,pypi_weekly,pypi_monthly,packagist_monthly,packagist_total,rubygems_total,stars_total" > stats/downloads.csv.new
            cat stats/downloads.csv >> stats/downloads.csv.new 2>/dev/null || true
            mv stats/downloads.csv.new stats/downloads.csv
          fi

      - name: Append to stats log
        run: |
          DATE=$(date -u +%Y-%m-%d)
          echo "$DATE,${{ steps.npm.outputs.weekly }},${{ steps.npm.outputs.total }},${{ steps.pypi.outputs.weekly }},${{ steps.pypi.outputs.monthly }},${{ steps.packagist.outputs.monthly }},${{ steps.packagist.outputs.total }},${{ steps.rubygems.outputs.total }},${{ steps.stars.outputs.total }}" >> stats/downloads.csv

      - name: Commit stats
        run: |
          git config user.name "vatnode-bot"
          git config user.email "bot@vatnode.dev"
          git add stats/downloads.csv
          git diff --staged --quiet || git commit -m "chore: weekly stats $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
